<!DOCTYPE html>
<html>
<head>
    <title>Verify 2FA</title>
    <style>
        body { font-family: Arial; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 8px 0; box-sizing: border-box; text-align: center; font-size: 20px; letter-spacing: 5px; }
        button { width: 100%; padding: 10px; background: #2c3e50; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .flash { color: red; font-size: 14px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🔢 Enter 2FA Code</h2>
        <p>Open your authenticator app and enter the 6-digit code</p>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <p class="flash">{{ message }}</p>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="POST">
            <input type="text" name="code" maxlength="6" placeholder="000000" required>
            <button type="submit">Verify</button>
        </form>
    </div>
</body>
</html>
